<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🃏 카드 매칭</title>
  <style>
    :root {
      --dark: #1a1a2e;
      --mid: #16213e;
      --deep: #0f3460;
      --accent: #a78bfa;
      --text: #e0e0e0;
      --muted: #8899aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 40px;
      background: rgba(22,33,62,0.9);
      border-bottom: 1px solid var(--deep);
      backdrop-filter: blur(8px);
    }

    .back-link { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .back-link:hover { color: var(--text); }
    .nav-sep { color: var(--deep); }
    .nav-title { font-weight: 700; font-size: 1rem; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2rem; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .score-board {
      display: flex;
      gap: 28px;
      background: var(--mid);
      border: 1px solid var(--deep);
      border-radius: 12px;
      padding: 14px 32px;
      margin-bottom: 28px;
    }

    .score-item { text-align: center; }
    .score-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .score-value { font-size: 1.4rem; font-weight: 700; color: var(--accent); }

    /* DIFFICULTY TABS */
    .diff-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .diff-tab {
      padding: 7px 20px;
      border-radius: 999px;
      border: 1px solid var(--deep);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .diff-tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }

    /* BOARD */
    #board {
      display: grid;
      gap: 10px;
    }

    .card {
      cursor: pointer;
      perspective: 700px;
    }

    .card-inner {
      position: relative;
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.38s ease;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .card-front {
      background: linear-gradient(135deg, #4c1d95, #5b21b6);
      border: 2px solid rgba(167,139,250,0.3);
      font-size: 1.2rem;
      color: rgba(255,255,255,0.3);
    }

    .card-back {
      background: var(--mid);
      border: 2px solid rgba(255,255,255,0.12);
      transform: rotateY(180deg);
    }

    .card.matched .card-back {
      border-color: #4ade80;
      box-shadow: 0 0 16px rgba(74,222,128,0.4);
    }

    /* Controls */
    .controls {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-start { background: var(--accent); color: #000; }

    /* Win modal */
    #win-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    #win-modal.show { display: flex; }

    .modal-box {
      background: var(--mid);
      border: 1px solid var(--deep);
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
    }
    .modal-box h2 { font-size: 2rem; margin-bottom: 10px; }
    .modal-box p { color: var(--muted); margin-bottom: 8px; }
    .modal-box .big { font-size: 1.3rem; color: var(--accent); font-weight: 700; margin-bottom: 28px; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="back-link">← 홈으로</a>
  <span class="nav-sep">/</span>
  <span class="nav-title">🃏 카드 매칭</span>
</nav>

<main>
  <h1>🃏 카드 매칭</h1>
  <p class="subtitle">같은 그림 카드를 찾아 모두 맞추세요</p>

  <div class="score-board">
    <div class="score-item">
      <div class="score-label">시도</div>
      <div class="score-value" id="moves">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">맞춤</div>
      <div class="score-value" id="pairs">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">시간</div>
      <div class="score-value" id="timer">0s</div>
    </div>
  </div>

  <div class="diff-tabs">
    <button class="diff-tab active" onclick="setDiff(4,4,this)">쉬움 (4×4)</button>
    <button class="diff-tab" onclick="setDiff(4,6,this)">보통 (4×6)</button>
    <button class="diff-tab" onclick="setDiff(6,6,this)">어려움 (6×6)</button>
  </div>

  <div id="board"></div>

  <div class="controls">
    <button class="btn btn-start" onclick="startGame()">새 게임</button>
  </div>
</main>

<div id="win-modal">
  <div class="modal-box">
    <h2>🎉 완성!</h2>
    <p>모든 카드를 맞췄습니다</p>
    <div class="big" id="result-text"></div>
    <button class="btn btn-start" onclick="startGame(); document.getElementById('win-modal').classList.remove('show')">다시 하기</button>
  </div>
</div>

<script>
const EMOJIS = ['🐶','🐱','🦊','🐻','🐼','🐨','🐸','🦁','🐯','🦄','🐙','🦋','🌸','⭐','🍕','🎸','🚀','🌈'];

let cols = 4, rows = 4, totalPairs;
let flipped = [], matched = 0, moves = 0, lock = false;
let timerIv = null, seconds = 0, started = false;

function setDiff(c, r, tab) {
  cols = c; rows = r;
  document.querySelectorAll('.diff-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  startGame();
}

function startGame() {
  clearInterval(timerIv);
  flipped = []; matched = 0; moves = 0; seconds = 0; started = false; lock = false;
  totalPairs = (cols * rows) / 2;
  document.getElementById('moves').textContent = 0;
  document.getElementById('pairs').textContent = '0/' + totalPairs;
  document.getElementById('timer').textContent = '0s';

  const deck = shuffle([...EMOJIS.slice(0, totalPairs), ...EMOJIS.slice(0, totalPairs)]);
  const board = document.getElementById('board');
  const cardSize = cols === 6 ? 80 : 90;

  board.style.gridTemplateColumns = `repeat(${cols}, ${cardSize}px)`;
  board.style.gridTemplateRows = `repeat(${rows}, ${cardSize}px)`;
  board.innerHTML = '';

  deck.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.width = cardSize + 'px';
    card.style.height = cardSize + 'px';
    card.dataset.emoji = emoji;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front" style="font-size:${cardSize*0.3}px">✦</div>
        <div class="card-back" style="font-size:${cardSize*0.45}px">${emoji}</div>
      </div>`;
    card.addEventListener('click', () => flipCard(card));
    board.appendChild(card);
  });
}

function flipCard(card) {
  if (lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (!started) { started = true; timerIv = setInterval(() => { seconds++; document.getElementById('timer').textContent = seconds + 's'; }, 1000); }

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length < 2) return;

  lock = true;
  moves++;
  document.getElementById('moves').textContent = moves;

  const [a, b] = flipped;
  if (a.dataset.emoji === b.dataset.emoji) {
    a.classList.add('matched'); b.classList.add('matched');
    matched++;
    document.getElementById('pairs').textContent = matched + '/' + totalPairs;
    flipped = []; lock = false;
    if (matched === totalPairs) {
      clearInterval(timerIv);
      setTimeout(() => {
        document.getElementById('result-text').textContent = `${moves}번 시도 · ${seconds}초`;
        document.getElementById('win-modal').classList.add('show');
      }, 400);
    }
  } else {
    setTimeout(() => {
      a.classList.remove('flipped'); b.classList.remove('flipped');
      flipped = []; lock = false;
    }, 900);
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

startGame();
</script>
</body>
</html>
