<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧩 2048</title>
  <style>
    :root {
      --dark: #1a1a2e;
      --mid: #16213e;
      --deep: #0f3460;
      --accent: #f59e0b;
      --text: #e0e0e0;
      --muted: #8899aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 40px;
      background: rgba(22,33,62,0.9);
      border-bottom: 1px solid var(--deep);
      backdrop-filter: blur(8px);
    }

    .back-link { color: var(--muted); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .back-link:hover { color: var(--text); }
    .nav-sep { color: var(--deep); }
    .nav-title { font-weight: 700; font-size: 1rem; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 { font-size: 2rem; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .score-board {
      display: flex;
      gap: 32px;
      background: var(--mid);
      border: 1px solid var(--deep);
      border-radius: 12px;
      padding: 14px 36px;
      margin-bottom: 24px;
    }

    .score-item { text-align: center; }
    .score-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .score-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

    /* BOARD */
    #board-wrap {
      background: #2a1e00;
      border-radius: 12px;
      padding: 12px;
      border: 2px solid #5a3c00;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-template-rows: repeat(4, 100px);
      gap: 10px;
    }

    .tile {
      width: 100px; height: 100px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      transition: background 0.1s;
      user-select: none;
    }

    /* Tile colors */
    .t0    { background: rgba(255,255,255,0.04); }
    .t2    { background: #eee4da; color: #776e65; }
    .t4    { background: #ede0c8; color: #776e65; }
    .t8    { background: #f2b179; color: #fff; }
    .t16   { background: #f59563; color: #fff; }
    .t32   { background: #f67c5f; color: #fff; }
    .t64   { background: #f65e3b; color: #fff; }
    .t128  { background: #edcf72; color: #fff; font-size: 1.5rem; }
    .t256  { background: #edcc61; color: #fff; font-size: 1.5rem; }
    .t512  { background: #edc850; color: #fff; font-size: 1.5rem; }
    .t1024 { background: #edc53f; color: #fff; font-size: 1.2rem; }
    .t2048 { background: #edc22e; color: #fff; font-size: 1.2rem; box-shadow: 0 0 20px rgba(237,194,46,0.6); }
    .t4096 { background: #b784a7; color: #fff; font-size: 1.1rem; }
    .t8192 { background: #9a4ab5; color: #fff; font-size: 1.1rem; }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-start { background: var(--accent); color: #000; }

    .hint { margin-top: 14px; font-size: 0.8rem; color: var(--muted); text-align: center; }

    /* OVERLAY */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    #overlay.show { display: flex; }

    .overlay-box {
      background: var(--mid);
      border: 1px solid var(--deep);
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
    }

    .overlay-box h2 { font-size: 2.2rem; margin-bottom: 10px; }
    .overlay-box p { color: var(--muted); margin-bottom: 28px; font-size: 1.05rem; }

    /* Mobile swipe area */
    @media (max-width: 500px) {
      #board { grid-template-columns: repeat(4, 72px); grid-template-rows: repeat(4, 72px); }
      .tile { width: 72px; height: 72px; font-size: 1.3rem; }
      .t128,.t256,.t512 { font-size: 1.1rem; }
      .t1024,.t2048,.t4096,.t8192 { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="back-link">← 홈으로</a>
  <span class="nav-sep">/</span>
  <span class="nav-title">🧩 2048</span>
</nav>

<main>
  <h1>🧩 2048</h1>
  <p class="subtitle">숫자 타일을 합쳐 2048을 만드세요!</p>

  <div class="score-board">
    <div class="score-item">
      <div class="score-label">점수</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">최고</div>
      <div class="score-value" id="best">0</div>
    </div>
  </div>

  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div class="controls">
    <button class="btn btn-start" onclick="newGame()">새 게임</button>
  </div>

  <p class="hint">방향키(↑↓←→)로 타일을 밀어 같은 숫자를 합치세요</p>
</main>

<div id="overlay">
  <div class="overlay-box">
    <h2 id="overlay-title">🎉 클리어!</h2>
    <p id="overlay-msg">2048을 달성했습니다!</p>
    <button class="btn btn-start" onclick="dismissOverlay()">계속하기</button>
  </div>
</div>

<script>
let grid, score, best = 0, won = false, over = false;

function newGame() {
  grid = Array(4).fill(null).map(() => Array(4).fill(0));
  score = 0; won = false; over = false;
  document.getElementById('overlay').classList.remove('show');
  addTile(); addTile();
  render();
}

function addTile() {
  const empty = [];
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) if (!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    const v = grid[r][c];
    const d = document.createElement('div');
    d.className = 'tile t' + (v > 8192 ? '8192' : v);
    d.textContent = v || '';
    board.appendChild(d);
  }
}

function slide(row) {
  let arr = row.filter(x=>x);
  let merged = false;
  for (let i=0; i<arr.length-1; i++) {
    if (arr[i] === arr[i+1] && !merged) {
      arr[i] *= 2;
      score += arr[i];
      if (score > best) best = score;
      if (arr[i] === 2048 && !won) { won = true; showOverlay('🎉 2048 달성!', '축하합니다! 계속 플레이하세요.'); }
      arr.splice(i+1, 1);
      merged = true;
    } else { merged = false; }
  }
  while (arr.length < 4) arr.push(0);
  return arr;
}

function move(dir) {
  if (over) return;
  const prev = JSON.stringify(grid);
  if (dir === 'left')  for (let r=0;r<4;r++) grid[r] = slide(grid[r]);
  if (dir === 'right') for (let r=0;r<4;r++) grid[r] = slide([...grid[r]].reverse()).reverse();
  if (dir === 'up')    for (let c=0;c<4;c++) { const col=grid.map(r=>r[c]); const s=slide(col); s.forEach((v,r)=>grid[r][c]=v); }
  if (dir === 'down')  for (let c=0;c<4;c++) { const col=grid.map(r=>r[c]).reverse(); const s=slide(col).reverse(); s.forEach((v,r)=>grid[r][c]=v); }
  if (JSON.stringify(grid) !== prev) { addTile(); if (isGameOver()) { over=true; showOverlay('💀 게임 오버', '더 이상 움직일 수 없습니다.'); } }
  render();
}

function isGameOver() {
  for (let r=0;r<4;r++) for (let c=0;c<4;c++) {
    if (!grid[r][c]) return false;
    if (r<3 && grid[r][c]===grid[r+1][c]) return false;
    if (c<3 && grid[r][c]===grid[r][c+1]) return false;
  }
  return true;
}

function showOverlay(title, msg) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

function dismissOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Touch swipe
let tx, ty;
document.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

newGame();
</script>
</body>
</html>
