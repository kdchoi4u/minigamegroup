<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 뱀 게임</title>
  <style>
    :root {
      --dark: #1a1a2e;
      --mid: #16213e;
      --deep: #0f3460;
      --accent: #4ade80;
      --red: #e94560;
      --text: #e0e0e0;
      --muted: #8899aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* NAV */
    nav {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 40px;
      background: rgba(22,33,62,0.9);
      border-bottom: 1px solid var(--deep);
      backdrop-filter: blur(8px);
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    .nav-sep { color: var(--deep); }

    .nav-title { font-weight: 700; font-size: 1rem; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      width: 100%;
    }

    h1 { font-size: 2rem; margin-bottom: 6px; }

    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    /* SCORE BOARD */
    .score-board {
      display: flex;
      gap: 32px;
      background: var(--mid);
      border: 1px solid var(--deep);
      border-radius: 12px;
      padding: 14px 36px;
      margin-bottom: 24px;
    }

    .score-item { text-align: center; }
    .score-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .score-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

    /* CANVAS */
    #game-canvas {
      border: 2px solid var(--deep);
      border-radius: 10px;
      background: #060612;
      display: block;
      touch-action: none;
    }

    /* CONTROLS */
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover { transform: translateY(-2px); opacity: 0.9; }

    .btn-start { background: var(--accent); color: #000; }
    .btn-pause { background: var(--mid); color: var(--text); border: 1px solid var(--deep); }

    .hint {
      margin-top: 14px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    /* MOBILE D-PAD */
    .dpad {
      display: none;
      margin-top: 20px;
      gap: 6px;
      flex-direction: column;
      align-items: center;
    }

    .dpad-row { display: flex; gap: 6px; }

    .dpad-btn {
      width: 56px; height: 56px;
      background: var(--mid);
      border: 1px solid var(--deep);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active { background: var(--deep); }

    @media (max-width: 500px) {
      .dpad { display: flex; }
      #game-canvas { width: 320px; height: 320px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="back-link">← 홈으로</a>
  <span class="nav-sep">/</span>
  <span class="nav-title">🐍 뱀 게임</span>
</nav>

<main>
  <h1>🐍 뱀 게임</h1>
  <p class="subtitle">먹이를 먹어 성장하고 최고 점수에 도전하세요</p>

  <div class="score-board">
    <div class="score-item">
      <div class="score-label">점수</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">최고</div>
      <div class="score-value" id="best">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">길이</div>
      <div class="score-value" id="length">3</div>
    </div>
  </div>

  <canvas id="game-canvas" width="400" height="400"></canvas>

  <div class="controls">
    <button class="btn btn-start" onclick="startGame()">시작 / 재시작</button>
    <button class="btn btn-pause" onclick="togglePause()" id="pause-btn">일시정지</button>
  </div>

  <p class="hint">방향키 (↑ ↓ ← →) 또는 W A S D 로 조종</p>

  <div class="dpad">
    <div class="dpad-row">
      <button class="dpad-btn" onclick="dpadPress('ArrowUp')">↑</button>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" onclick="dpadPress('ArrowLeft')">←</button>
      <button class="dpad-btn" onclick="dpadPress('ArrowDown')">↓</button>
      <button class="dpad-btn" onclick="dpadPress('ArrowRight')">→</button>
    </div>
  </div>
</main>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const SIZE = 20, COLS = 20, ROWS = 20;
const COLORS = { head: '#4ade80', body: '#22c55e', food: '🍎' };

let snake, food, dir, nextDir, score, best = 0, running = false, paused = false, iv;

function startGame() {
  clearInterval(iv);
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; running = true; paused = false;
  document.getElementById('pause-btn').textContent = '일시정지';
  updateUI();
  placeFood();
  iv = setInterval(tick, 145);
}

function placeFood() {
  let p;
  do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===p.x && s.y===p.y));
  food = p;
}

function tick() {
  if (!running || paused) return;
  dir = nextDir;
  const h = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (h.x < 0 || h.x >= COLS || h.y < 0 || h.y >= ROWS || snake.some(s=>s.x===h.x&&s.y===h.y)) {
    gameOver(); return;
  }

  snake.unshift(h);
  if (h.x === food.x && h.y === food.y) {
    score += 10;
    if (score > best) best = score;
    placeFood();
  } else {
    snake.pop();
  }
  updateUI();
  draw();
}

function gameOver() {
  clearInterval(iv); running = false;
  draw();
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, 400, 400);
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 40px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('게임 오버', 200, 170);
  ctx.fillStyle = '#fff';
  ctx.font = '22px Segoe UI';
  ctx.fillText('점수: ' + score, 200, 215);
  ctx.fillStyle = '#8899aa';
  ctx.font = '15px Segoe UI';
  ctx.fillText('시작 버튼으로 재시작', 200, 250);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '계속하기' : '일시정지';
  if (!paused) { draw(); } else {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,400,400);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('일시정지', 200, 200);
  }
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('length').textContent = snake.length;
}

function draw() {
  ctx.fillStyle = '#060612'; ctx.fillRect(0,0,400,400);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 0.5;
  for (let i=0;i<=COLS;i++) { ctx.beginPath(); ctx.moveTo(i*SIZE,0); ctx.lineTo(i*SIZE,400); ctx.stroke(); }
  for (let i=0;i<=ROWS;i++) { ctx.beginPath(); ctx.moveTo(0,i*SIZE); ctx.lineTo(400,i*SIZE); ctx.stroke(); }

  // food
  ctx.font = SIZE+'px serif'; ctx.textAlign = 'left';
  ctx.fillText('🍎', food.x*SIZE, (food.y+1)*SIZE - 1);

  // snake
  snake.forEach((s, i) => {
    const alpha = 1 - (i / snake.length) * 0.5;
    ctx.fillStyle = i === 0 ? '#4ade80' : `rgba(34,197,94,${alpha})`;
    ctx.beginPath();
    ctx.roundRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2, 3);
    ctx.fill();

    // eyes on head
    if (i === 0) {
      ctx.fillStyle = '#000';
      const eyeSize = 3;
      let ex1, ey1, ex2, ey2;
      const cx = s.x*SIZE + SIZE/2, cy = s.y*SIZE + SIZE/2;
      if (dir.x === 1)  { ex1=cx+3; ey1=cy-4; ex2=cx+3; ey2=cy+4; }
      else if (dir.x === -1) { ex1=cx-3; ey1=cy-4; ex2=cx-3; ey2=cy+4; }
      else if (dir.y === -1) { ex1=cx-4; ey1=cy-3; ex2=cx+4; ey2=cy-3; }
      else              { ex1=cx-4; ey1=cy+3; ex2=cx+4; ey2=cy+3; }
      ctx.beginPath(); ctx.arc(ex1,ey1,eyeSize,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2,ey2,eyeSize,0,Math.PI*2); ctx.fill();
    }
  });
}

function handleKey(key) {
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1},
    ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0}
  };
  const nd = map[key];
  if (!nd) return;
  if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
}

function dpadPress(key) { handleKey(key); }

document.addEventListener('keydown', e => {
  const keys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'];
  if (keys.includes(e.key)) e.preventDefault();
  handleKey(e.key);
});

// Swipe support
let tx, ty;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) handleKey(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
  else handleKey(dy > 0 ? 'ArrowDown' : 'ArrowUp');
}, {passive:false});

// idle screen
ctx.fillStyle = '#060612'; ctx.fillRect(0,0,400,400);
ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '17px Segoe UI'; ctx.textAlign = 'center';
ctx.fillText('시작 버튼을 눌러 게임을 시작하세요', 200, 200);
</script>
</body>
</html>
